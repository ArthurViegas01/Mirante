# Mirante dev stack: libSQL (sqld) + Go API + SvelteKit (dev server).
# Usage: docker compose up --build  → web at http://localhost:5173

services:
  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    environment:
      - SQLD_NODE=primary
    ports:
      - "8081:8080" # sqld HTTP (host:container) — optional, for debugging
    volumes:
      - libsql-data:/var/lib/sqld

  api:
    build:
      context: ./apps/api
    environment:
      - APP_ENV=development
      - HTTP_ADDR=:8080
      - WEB_ORIGIN=http://localhost:5173
      - DATABASE_URL=http://libsql:8080
      - SESSION_COOKIE_NAME=mirante_session
      - OWNER_EMAIL=owner@example.com
      - OWNER_PASSWORD=change-me-dev
    ports:
      - "8080:8080"
    depends_on:
      - libsql
    # The API pings the DB on boot; retry until libsql is ready.
    restart: on-failure

  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - API_URL=http://api:8080
    volumes:
      - ./apps/web:/app
      - /app/node_modules # anonymous volume: keep container's linux node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  libsql-data:
