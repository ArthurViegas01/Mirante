# Mirante dev stack: libSQL (sqld) + Go API + SvelteKit (dev server).
# Usage: docker compose up --build  → web at http://localhost:5173

services:
  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    environment:
      - SQLD_NODE=primary
    ports:
      - "8081:8080" # sqld HTTP (host:container) — optional, for debugging
    volumes:
      - libsql-data:/var/lib/sqld

  api:
    build:
      context: ./apps/api
    environment:
      - APP_ENV=development
      - HTTP_ADDR=:8080
      - WEB_ORIGIN=http://localhost:5173
      - DATABASE_URL=http://libsql:8080
      - SESSION_COOKIE_NAME=mirante_session
      - OWNER_EMAIL=owner@example.com
      - OWNER_PASSWORD=change-me-dev
      # LLM (F3). Set GROQ_API_KEY in a .env file at the repo root (gitignored);
      # compose substitutes it here. Empty = LLM features stay disabled.
      - LLM_PROVIDER=groq
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      # Password reset e-mail. For REAL delivery set RESEND_API_KEY (+ MAIL_FROM,
      # de um domínio verificado no Resend) num .env na raiz — é o caminho da API
      # HTTP, recomendado. Sem isso, cai no SMTP, que por padrão é o Mailpit (caixa
      # local em http://localhost:8025). Tudo vem do .env, sem versionar segredo.
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - MAIL_FROM=${MAIL_FROM:-}
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-Mirante <no-reply@mirante.local>}
    ports:
      - "8080:8080"
    depends_on:
      - libsql
      - mailpit
    # The API pings the DB on boot; retry until libsql is ready.
    restart: on-failure

  # Dev-only SMTP catcher: the API "sends" reset e-mail here; you read it in the
  # browser. Captures everything, delivers nothing — no credentials, no real mail.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web inbox — open this to read captured e-mail
      - "1025:1025" # SMTP endpoint the API delivers to

  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - API_URL=http://api:8080
    volumes:
      - ./apps/web:/app
      - /app/node_modules # anonymous volume: keep container's linux node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  libsql-data:
