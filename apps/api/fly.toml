# Fly.io deploy for the Mirante API. Run `fly deploy` from this directory
# (apps/api), or `fly deploy -c apps/api/fly.toml --dockerfile apps/api/Dockerfile`.
#
# SINGLE MACHINE ONLY (ADR-0002): the SSE hub, the monitor scheduler, and the
# hourly check-rollup compactor are in-memory/in-process and assume one writer.
# Horizontal scale would duplicate checks/alerts. Keep exactly one machine:
#   fly scale count 1
#
# Secrets — set once with `fly secrets set` (NEVER commit them here):
#   fly secrets set \
#     DATABASE_URL="libsql://<your-db>.turso.io" \
#     DATABASE_AUTH_TOKEN="<turso token>" \
#     APP_SECRET_KEY="$(openssl rand -base64 32)" \
#     WEB_ORIGIN="https://<your-web-host>" \
#     GROQ_API_KEY="<groq key, optional>"
# The owner is claimed via first-run signup, so no OWNER_* is needed in prod.

app = "mirante-api"
primary_region = "gru" # São Paulo; change to your nearest Fly region

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  HTTP_ADDR = ":8080"
  OTEL_SERVICE_NAME = "mirante-api"
  MONITOR_RETENTION_DAYS = "14"

[http_service]
  internal_port = 8080
  force_https = true
  # No scale-to-zero: the in-process scheduler must keep running to probe
  # services and compact rollups even with no inbound traffic.
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

# A small machine is plenty for a single-user app; bump if needed.
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
