version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - revive
    - unconvert
  settings:
    gosec:
      excludes:
        # G115: the keyLen conversion in auth/password.go is bounds-checked.
        # G124: the session cookie's Secure flag is gated by APP_ENV
        #       (production = Secure; local dev runs over plain http).
        - G115
        - G124
    misspell:
      # Domain vocabulary and comments are Portuguese; these are correct pt-BR,
      # not misspellings of their English look-alikes (annual / protocols).
      ignore-rules:
        - anual
        - protocolos
        - comandos
        - profissional
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    rules:
      # Test files may use weaker rand and skip some error checks deliberately.
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
